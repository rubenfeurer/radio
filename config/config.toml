# Default radio stations configuration
default_stations = [
    "GDS.FM",
    "Ambi Nature Radio",
    "SRF 3"
] 
# Default volume setting (0-100)
default_volume = 80

# GPIO Pin Configuration
[gpio]
rotary = { clk = 11, dt = 9, sw = 10 }
buttons = { button1 = 23, button2 = 24, button3 = 25 }

# GPIO Settings
[gpio.settings]
debounce_time = 300  # Debounce time in milliseconds
pull_up = true       # Use pull-up resistors

[rotary.settings]
volume_step = 5              # Volume change per rotation step
double_click_timeout = 500   # Double click timeout in milliseconds
debounce_time = 50          # Debounce time for button in milliseconds
clockwise_increases = true   # When true, clockwise rotation increases volume

# Audio Configuration
[audio]
initial_volume = 80
volume_step = 5

# Stations Configuration
[stations]
default = "https://stream.srg-ssr.ch/m/drs3/mp3_128"
