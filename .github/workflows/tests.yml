name: Radio Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        # Install NetworkManager and other dependencies
        sudo apt-get install -y \
          python3-dev python3-setuptools gcc make \
          mpv libmpv-dev \
          python3-pip python3-venv \
          libasound2-dev \
          network-manager wireless-tools

        # Download and build pigpio
        wget https://github.com/joan2937/pigpio/archive/master.zip
        unzip master.zip
        cd pigpio-master
        make
        sudo make install
        
        # Create required directories and set permissions
        sudo mkdir -p /var/run/pigpio
        sudo chmod 777 /var/run/pigpio
        
        # Configure and start NetworkManager
        sudo systemctl stop NetworkManager
        sudo rm -f /etc/NetworkManager/system-connections/*
        sudo cp /etc/NetworkManager/NetworkManager.conf /etc/NetworkManager/NetworkManager.conf.backup
        echo -e "[main]\nplugins=ifupdown,keyfile\n\n[ifupdown]\nmanaged=true\n\n[device]\nwifi.scan-rand-mac-address=no" | sudo tee /etc/NetworkManager/NetworkManager.conf
        sudo systemctl start NetworkManager
        sudo systemctl status NetworkManager
        
        # Start pigpio daemon
        sudo pigpiod -l -t 0 || true

        # Ensure port 80 is free
        sudo lsof -t -i:80 | xargs -r sudo kill -9
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx pytest pytest-asyncio pytest-cov pytest-mock
        
    - name: Run tests with mocked hardware
      env:
        MOCK_HARDWARE: "true"
        PYTHONPATH: .
        TEST_MODE: "CI"
        DISABLE_HARDWARE: "true"
        SKIP_NM_CHECK: "true"
        # Add environment variables for NetworkManager testing
        NM_TEST_MODE: "true"
        NM_MOCK_WIFI: "true"
        # Add environment variable for port 80 testing
        TEST_PORT: "80"
        SUDO_ALLOWED: "true"
      run: |
        # Create test wifi interface
        sudo ip link add wlan0 type dummy || true
        sudo ip link set wlan0 up || true
        
        # Run pytest with sudo for port 80 access
        sudo -E env "PATH=$PATH" pytest -v tests/ --cov=src --capture=no --log-cli-level=DEBUG
        
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Tests passed
        run: echo "All tests passed successfully!"