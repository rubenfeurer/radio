name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install python-vlc
        pip install toml
        pip install requests
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Setup mock RPi.GPIO
      run: |
        # Create Python package directory
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        sudo mkdir -p ${SITE_PACKAGES}/RPi
        
        # Create mock GPIO module
        echo '
        class GPIO:
            BCM = 11
            IN = 1
            OUT = 0
            FALLING = 2
            PUD_UP = 22
            
            @staticmethod
            def setmode(*args): pass
            
            @staticmethod
            def setup(*args, **kwargs): pass
            
            @staticmethod
            def add_event_detect(*args, **kwargs): pass
            
            @staticmethod
            def cleanup(): pass
            
            @staticmethod
            def output(*args): pass
        ' | sudo tee ${SITE_PACKAGES}/RPi/GPIO.py
        
        # Create __init__.py to make it a proper package
        echo "from .GPIO import GPIO" | sudo tee ${SITE_PACKAGES}/RPi/__init__.py
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y vlc
    
    - name: List project structure
      run: |
        echo "Project structure:"
        ls -R
        echo "Python path:"
        python -c "import sys; print('\n'.join(sys.path))"
        echo "Site packages:"
        python -c "import site; print('\n'.join(site.getsitepackages()))"
    
    - name: Run tests with detailed output
      run: |
        PYTHONPATH=$PYTHONPATH:$(pwd) python -m pytest -v --tb=long