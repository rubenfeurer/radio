name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install python-vlc
        pip install toml
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y vlc
        sudo apt-get install -y python3-rpi.gpio || true
        # Create mock GPIO module for testing
        echo "class GPIO: BCM=11; IN=1; OUT=0; FALLING=2; PUD_UP=22; @staticmethod def setmode(*args): pass; @staticmethod def setup(*args, **kwargs): pass; @staticmethod def add_event_detect(*args, **kwargs): pass; @staticmethod def cleanup(): pass" > /tmp/RPi.py
        sudo mv /tmp/RPi.py /usr/local/lib/python3.11/dist-packages/RPi.py
    
    - name: Run tests with detailed output
      run: |
        python -m pytest -v --tb=long