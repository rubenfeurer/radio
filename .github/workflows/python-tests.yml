name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Create required directories
      run: |
        mkdir -p logs
        mkdir -p config
        touch logs/radio.log
        
    - name: Create config files
      run: |
        echo '{
          "state": "stopped",
          "current_station": null,
          "volume": 80
        }' > config/radio_state.json
        
        echo '[radio]
        volume = 80' > config/config.toml
        
        echo '[[streams]]
        name = "Test Station"
        url = "http://test.stream/url"' > config/streams.toml
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install python-vlc
        pip install toml
        pip install requests
        pip install flask
    
    - name: Setup mock RPi.GPIO
      run: |
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        sudo mkdir -p ${SITE_PACKAGES}/RPi
        
        echo '
        class GPIO:
            BCM = 11
            IN = 1
            OUT = 0
            FALLING = 2
            PUD_UP = 22
            
            @staticmethod
            def setmode(*args): pass
            
            @staticmethod
            def setup(*args, **kwargs): pass
            
            @staticmethod
            def add_event_detect(*args, **kwargs): pass
            
            @staticmethod
            def cleanup(): pass
            
            @staticmethod
            def output(*args): pass
        ' | sudo tee ${SITE_PACKAGES}/RPi/GPIO.py
        
        echo "from .GPIO import GPIO" | sudo tee ${SITE_PACKAGES}/RPi/__init__.py
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y vlc
    
    - name: Run tests with detailed output
      run: |
        PYTHONPATH=$PYTHONPATH:$(pwd) python -m pytest -v --tb=long tests/test_gpio_handler.py tests/test_radio_player.py